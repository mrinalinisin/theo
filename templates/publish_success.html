{% extends "base.html" %}
{% block title %}Published — Theo{% endblock %}

{% block content %}
<div class="page-header">
  <div class="page-header-top">
    <div class="page-title">Published</div>
  </div>
</div>

<div class="page-body" style="max-width:640px;">
  <div class="callout callout-success mb-16">
    <strong>"{{ page_name }}"</strong> is live on <code>{{ repo }}</code>.
    <div style="margin-top:8px;">
      <a href="{{ url }}" target="_blank" rel="noopener" id="published-url">{{ url }}</a>
    </div>
  </div>

  <div class="text-sm text-faint">
    Opening in a new tab — if your browser blocked the popup, click the link above.
    <a href="{{ url_for('shopping_list') }}">Back to Browse</a>
  </div>
</div>

<script>
(function() {
  const publishedUrl = {{ url|tojson }};
  const browseUrl    = {{ url_for('shopping_list')|tojson }};

  // Open the published page in a new tab. The user-gesture chain from the
  // form submit usually allows this; if a strict popup blocker rejects it
  // (w === null), the manual link above is the fallback.
  const w = window.open(publishedUrl, '_blank');

  // Best-effort "background tab" — approximates Roger's behaviour by
  // immediately blurring the new window and refocusing the original.
  // Browser support varies; some browsers ignore .blur() / .focus() across
  // tabs. When ignored, the new tab gets foreground focus, which is still
  // a reasonable default.
  if (w) { try { w.blur(); window.focus(); } catch (e) {} }

  // Drop the original tab back to Browse after a short pause so the user
  // sees the success message but isn't stranded on the success page.
  setTimeout(function() { window.location.href = browseUrl; }, 1500);
})();
</script>
{% endblock %}
