{% extends "base.html" %}
{% block title %}Gummi – Home{% endblock %}

{% block content %}
<div class="page-body">
  <div class="home-grid">
    <a href="{{ url_for('shopping_list') }}" class="home-card">
      <span class="home-card-icon">🛒</span>
      <span class="home-card-label">Browse</span>
    </a>
    <a href="{{ url_for('add_item') }}" class="home-card">
      <span class="home-card-icon">😍</span>
      <span class="home-card-label">Add Product</span>
    </a>
    <a href="{{ url_for('add_purchase') }}" class="home-card">
      <span class="home-card-icon">💸</span>
      <span class="home-card-label">Add Purchase</span>
    </a>
    <a href="{{ url_for('purchases') }}" class="home-card">
      <span class="home-card-icon">🛍️</span>
      <span class="home-card-label">Purchases</span>
    </a>
    <a href="{{ url_for('analytics') }}" class="home-card">
      <span class="home-card-icon">📊</span>
      <span class="home-card-label">Analytics</span>
    </a>
  </div>
</div>
{% endblock %}
