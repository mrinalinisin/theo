<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Roger → Theo</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <h1>Roger</h1>
    <span class="subtitle">→ Theo</span>
  </header>

  <form id="roger-form">
    <label>
      Name
      <input type="text" id="name" required maxlength="256" />
    </label>

    <div class="row">
      <label class="grow">
        Store
        <input type="text" id="store" />
      </label>
      <label class="price">
        Price
        <input type="number" id="price" step="0.01" min="0" />
      </label>
      <label class="currency">
        Cur.
        <input type="text" id="currency" value="INR" maxlength="3" />
      </label>
    </div>

    <label>
      Image
      <select id="image_url"></select>
    </label>

    <label>
      Notes
      <textarea id="notes" rows="3"></textarea>
    </label>

    <div class="tags-block">
      <div class="tags-label">
        Tags <span class="hint" id="tags-hint">loading…</span>
      </div>
      <div id="tag-chips" class="tag-chips"></div>
      <input type="text" id="new-tag" placeholder="+ add a new tag, then Enter" />
    </div>

    <input type="hidden" id="url" />

    <div class="actions">
      <button type="submit" id="submit-btn">Send to Theo</button>
    </div>

    <div id="status" class="status" role="status" aria-live="polite"></div>
  </form>

  <script src="popup.js"></script>
</body>
</html>
