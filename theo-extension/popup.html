<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <strong>Save to Theo</strong>
    <span id="status"></span>
  </header>

  <form id="form">
    <label>Name
      <input type="text" name="name" required>
    </label>

    <div class="row">
      <label class="grow">Store
        <input type="text" name="store">
      </label>
      <label>Price
        <input type="text" name="price" inputmode="decimal">
      </label>
      <label>Currency
        <select name="currency">
          <option>INR</option>
          <option>USD</option>
          <option>EUR</option>
          <option>GBP</option>
          <option>JPY</option>
        </select>
      </label>
    </div>

    <label>Tags <small>(comma-separated)</small>
      <input type="text" name="tag_names" placeholder="e.g. shoes, summer">
    </label>

    <label>Notes
      <textarea name="notes" rows="2"></textarea>
    </label>

    <label class="inline">
      <input type="checkbox" name="track_price">
      Track price changes
    </label>

    <fieldset>
      <legend>Images <small id="img-count"></small></legend>
      <div id="images" class="image-grid"></div>
    </fieldset>

    <div class="actions">
      <button type="submit" id="save">Save</button>
      <button type="button" id="cancel">Cancel</button>
    </div>
  </form>

  <script src="popup.js"></script>
</body>
</html>
